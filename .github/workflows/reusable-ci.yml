name: Framework CI

on:
  workflow_call:
    inputs:
      submodules:
        description: 'Submodule checkout strategy (recursive, true, false)'
        required: false
        default: 'recursive'
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  semantic-pr-check:
    name: Validate PR Title (Semantic)
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - name: Semantic PR Check
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  discover:
    name: Discovery
    runs-on: ubuntu-24.04
    outputs:
      universe: ${{ steps.set-matrix.outputs.universe }}
      hardware: ${{ steps.set-matrix.outputs.hardware }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.submodules }}
      - id: set-matrix
        name: Generate Preset Matrix
        run: |
          set -eo pipefail
          RAW_MATRIX=$(python3 ./caffeine-build/scripts/ci.py list)
          echo "universe=$(echo "$RAW_MATRIX" | jq -c .universe)" >> "$GITHUB_OUTPUT"
          echo "hardware=$(echo "$RAW_MATRIX" | jq -c .hardware)" >> "$GITHUB_OUTPUT"

  lint-format:
    name: Format
    needs: discover
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset: ${{ fromJson(needs.discover.outputs.universe) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.submodules }}
      - name: Check Formatting
        env:
          PRESET: ${{ matrix.preset.name }}
        run: python3 ./caffeine-build/scripts/ci.py format "$PRESET"

  documentation:
    name: Docs
    needs: [discover, lint-format]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset: ${{ fromJson(needs.discover.outputs.universe) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.submodules }}
      - name: Build Documentation
        env:
          PRESET: ${{ matrix.preset.name }}
        run: python3 ./caffeine-build/scripts/ci.py doc "$PRESET"

  static-analysis:
    name: Analysis
    needs: [discover, lint-format]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset: ${{ fromJson(needs.discover.outputs.universe) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.submodules }}
      - name: Run Static Analysis
        env:
          PRESET: ${{ matrix.preset.name }}
        run: python3 ./caffeine-build/scripts/ci.py analyze "$PRESET"

  build-and-test:
    name: Build & Test
    needs: [discover, static-analysis]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset: ${{ fromJson(needs.discover.outputs.hardware) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.submodules }}
      - name: Cache Build Directory
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset.name }}
          key: ${{ runner.os }}-build-${{ matrix.preset.name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-${{ matrix.preset.name }}-
      - name: Build All Targets
        env:
          PRESET: ${{ matrix.preset.name }}
          CAFFEINE_DOCKER_DIGEST: ${{ vars.CURRENT_DOCKER_DIGEST }}
        run: python3 ./caffeine-build/scripts/ci.py build "$PRESET"
      - name: Run Unit Tests
        if: ${{ matrix.preset.tests }}
        env:
          PRESET: ${{ matrix.preset.name }}
          CAFFEINE_DOCKER_DIGEST: ${{ vars.CURRENT_DOCKER_DIGEST }}
        run: python3 ./caffeine-build/scripts/ci.py test "$PRESET"
      - name: Run Coverage
        if: ${{ matrix.preset.tests }}
        env:
          PRESET: ${{ matrix.preset.name }}
          CAFFEINE_DOCKER_DIGEST: ${{ vars.CURRENT_DOCKER_DIGEST }}
        run: python3 ./caffeine-build/scripts/ci.py coverage "$PRESET"
      - name: PR Comment with Coverage
        if: ${{ matrix.preset.tests && github.event_name == 'pull_request' }}
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const covFile = 'build/${{ matrix.preset.name }}/coverage.txt';
            if (fs.existsSync(covFile)) {
                const coverage = fs.readFileSync(covFile, 'utf8');
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: '### Code Coverage Report 📊 (`${{ matrix.preset.name }}`)\n```\n' + coverage + '\n```'
                });
            } else {
                console.log("Coverage file not found: " + covFile);
            }
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.preset.name }}
          path: |
            build/${{ matrix.preset.name }}/**/*.elf
            build/${{ matrix.preset.name }}/**/*.hex
            build/${{ matrix.preset.name }}/**/*.bin
            build/${{ matrix.preset.name }}/**/*.map
            build/${{ matrix.preset.name }}/**/Test.xml
          retention-days: 14
