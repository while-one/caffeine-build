name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  sanity-checks:
    name: Sanity Checks (Scripts & Formatting)
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4

    - name: Check Shell Scripts Executable
      run: |
        if [ ! -x "scripts/build.sh" ]; then
          echo "build.sh is not executable!"
          exit 1
        fi

    - name: Lint JSON Presets
      run: |
        for file in cmake/presets/*.json; do
          if ! jq . "$file" > /dev/null; then
            echo "Invalid JSON in $file"
            exit 1
          fi
        done
        for file in cmake/presets/*/*.json; do
          if [ -f "$file" ]; then
            if ! jq . "$file" > /dev/null; then
              echo "Invalid JSON in $file"
              exit 1
            fi
          fi
        done
