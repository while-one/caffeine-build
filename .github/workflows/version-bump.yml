name: Automatic SemVer Bump

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_call:
    secrets:
      SEMVER_BUMP_TOKEN:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SEMVER_BUMP_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Determine Bump Type
        id: bump_type
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          BODY="$PR_BODY"
          TITLE="$PR_TITLE"
          
          # Default to patch
          BUMP="patch"
          
          if printf "%s\n" "$BODY" | grep -iq "\[x\] major" || printf "%s\n" "$TITLE" | grep -iq "\[major\]"; then
            BUMP="major"
          elif printf "%s\n" "$BODY" | grep -iq "\[x\] minor" || printf "%s\n" "$TITLE" | grep -iq "\[minor\]"; then
            BUMP="minor"
          elif printf "%s\n" "$BODY" | grep -iq "\[x\] patch" || printf "%s\n" "$TITLE" | grep -iq "\[patch\]"; then
            BUMP="patch"
          fi
          
          echo "BUMP=$BUMP" >> $GITHUB_ENV
          echo "Detected bump type: $BUMP"

      - name: Bump Version in CMakeLists.txt
        if: env.BUMP != 'none'
        id: bump
        run: |
          python3 -c '
          import re, os, sys
          
          bump_type = os.environ.get("BUMP", "none")
          if bump_type == "none":
              print("Error: No bump type specified.", file=sys.stderr)
              sys.exit(1)
              
          filename = "CMakeLists.txt"
          if not os.path.exists(filename):
              print(f"Error: {filename} not found.", file=sys.stderr)
              sys.exit(1)
              
          with open(filename, "r") as f:
              content = f.read()
              
          # Constrain matching strictly to the project() block
          pattern = r"(project\(\s*[\w\-]+\s+.*?VERSION\s+)(\d+\.\d+\.\d+)"
          match = re.search(pattern, content, re.IGNORECASE | re.DOTALL)
          if not match:
              print("Error: Could not locate project VERSION block in CMakeLists.txt", file=sys.stderr)
              sys.exit(1)
              
          prefix = match.group(1)
          current_version = match.group(2)
          print(f"Current version: {current_version}")
          
          try:
              parts = list(map(int, current_version.split(".")))
          except ValueError:
              print(f"Error: Invalid version format {current_version}", file=sys.stderr)
              sys.exit(1)
              
          if len(parts) != 3:
              print(f"Error: Version must be 3 parts (SemVer), got {current_version}", file=sys.stderr)
              sys.exit(1)
              
          if bump_type == "major":
              parts[0] += 1
              parts[1] = 0
              parts[2] = 0
          elif bump_type == "minor":
              parts[1] += 1
              parts[2] = 0
          elif bump_type == "patch":
              parts[2] += 1
          else:
              print(f"Error: Unknown bump type {bump_type}", file=sys.stderr)
              sys.exit(1)
              
          new_version = f"{parts[0]}.{parts[1]}.{parts[2]}"
          print(f"New version: {new_version}")
          
          # Write to GITHUB_ENV if available
          if "GITHUB_ENV" in os.environ:
              with open(os.environ["GITHUB_ENV"], "a") as env_file:
                  env_file.write(f"NEW_VERSION={new_version}\n")
                  
          # Precise block-level replacement
          new_content = re.sub(pattern, lambda m: f"{m.group(1)}{new_version}", content, count=1, flags=re.IGNORECASE | re.DOTALL)
          
          with open(filename, "w") as f:
              f.write(new_content)
          '


      - name: Commit and Push
        if: env.BUMP != 'none'
        env:
          GITHUB_TOKEN: ${{ secrets.SEMVER_BUMP_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Only commit if there are changes
          if ! git diff --quiet CMakeLists.txt; then
            git add CMakeLists.txt
            git commit -m "semberbot: bump version to ${{ env.NEW_VERSION }} [skip ci]"
            
            # Use the token for authentication in push
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            
            # Create tag
            git tag "v${{ env.NEW_VERSION }}"
            
            # Push changes to the branch and tag atomically
            git push --atomic origin HEAD:main "v${{ env.NEW_VERSION }}"
          else
            echo "No version changes to commit."
          fi
